<style>
  body { background: #0a0d12; }
  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  h2 { margin: 0; font-size: 1.6rem; font-weight: 700; letter-spacing: -0.01em; color: #f0f0f0; }
  .subtitle-text { margin: 0; color: #6b7280; font-size: 0.9rem; }

  /* Sélecteurs */
  .selectors { display: flex; flex-direction: column; gap: 12px; }
  .selector-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .selector-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #6b7280;
    min-width: 72px;
  }
  .note-btns { display: flex; flex-wrap: wrap; gap: 6px; }
  .note-btn {
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: #9ca3af;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
  }
  .note-btn.active {
    background: linear-gradient(135deg, #f5b14a, #e89320);
    border-color: transparent;
    color: #1a0f00;
  }
  .quality-btns { display: flex; gap: 8px; }
  .quality-btn {
    padding: 7px 18px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: #9ca3af;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
  }
  .quality-btn.active {
    background: rgba(245,177,74,0.15);
    border-color: rgba(245,177,74,0.4);
    color: #f5b14a;
    font-weight: 600;
  }

  /* Légende */
  .legend {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: #9ca3af; }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 50%;
  }
  .dot-root   { background: #f5b14a; box-shadow: 0 0 8px rgba(245,177,74,0.6); }
  .dot-third  { background: #56c2ff; box-shadow: 0 0 8px rgba(86,194,255,0.5); }
  .dot-fifth  { background: #e0e0e0; box-shadow: 0 0 6px rgba(255,255,255,0.3); }

  /* Rows */
  .triad-rows { display: flex; flex-direction: column; gap: 20px; }
  .triad-row {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .row-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #6b7280;
  }
  .row-strings {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    color: #4b5563;
    margin-top: -6px;
  }

  /* Mini-manche SVG */
  .mini-fret {
    width: 100%;
    height: 80px;
    display: block;
  }
</style>
